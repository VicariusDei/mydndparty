name: Deploy MyDndParty to Aruba

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-mydndparty
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    environment: mydndparty

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        working-directory: app
        run: npm install

      - name: Build frontend for /mydndparty/
        working-directory: app
        run: npm run build -- --base=/mydndparty/

      - name: Prepare deploy package
        run: |
          rm -rf deploy-package
          mkdir -p deploy-package

          # Frontend statico generato da Vite/Ionic
          cp -R dist/. deploy-package/

          # Backend PHP API compatibile Aruba basic
          mkdir -p deploy-package/api
          rsync -av \
            --exclude='config/config.php' \
            api/ deploy-package/api/

          # Fallback SPA per refresh diretto su rotte Ionic/Vue.
          cat > deploy-package/.htaccess <<'EOF'
          <IfModule mod_rewrite.c>
            RewriteEngine On
            RewriteBase /mydndparty/
            RewriteCond %{REQUEST_FILENAME} !-f
            RewriteCond %{REQUEST_FILENAME} !-d
            RewriteRule . /mydndparty/index.html [L]
          </IfModule>
          EOF

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ vars.FTP_SERVER || secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME || vars.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD || vars.FTP_PASSWORD }}
          local-dir: ./deploy-package/
          server-dir: ${{ vars.FTP_TARGET_DIR || secrets.FTP_TARGET_DIR }}
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/api/config/config.php
